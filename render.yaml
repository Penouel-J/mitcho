services:
  - type: web
    name: mitcho-backend
    runtime: python
    rootDir: mitcho-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free

    envVars:
      # ── Obligatoire ──────────────────────────────────────────────────────────
      - key: GROQ_API_KEY
        sync: false          # à renseigner manuellement dans le dashboard Render

      - key: SECRET_KEY
        generateValue: true  # Render génère automatiquement une clé sécurisée

      # ── Optionnel ────────────────────────────────────────────────────────────
      - key: RESEND_API_KEY
        sync: false

      - key: FROM_EMAIL
        value: alertes@mitchobenin.org

      # ── Performance / stabilité sur free tier ────────────────────────────────
      # Désactive sentence-transformers (trop lourd pour 512MB RAM)
      # → utilise le fallback ChromaDB ONNX (léger, ~90MB)
      - key: USE_SENTENCE_TRANSFORMERS
        value: "false"

      # Désactive l'ingestion CSV au démarrage (trop lente sur free tier)
      # Activer manuellement via POST /analysis/gdelt/ingest après démarrage
      - key: AUTO_INGEST
        value: "false"

      # CORS — mettre à jour avec l'URL Vercel réelle après déploiement frontend
      - key: ALLOWED_ORIGINS
        value: "https://mitcho.vercel.app,https://mitchobenin.vercel.app,http://localhost:3000,http://localhost:5500,null"
